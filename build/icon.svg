<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f0f23"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e07a5f"/>
      <stop offset="50%" style="stop-color:#d4603a"/>
      <stop offset="100%" style="stop-color:#c44b28"/>
    </linearGradient>
    <linearGradient id="face-glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f2cc8f"/>
      <stop offset="100%" style="stop-color:#e07a5f"/>
    </linearGradient>
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="outer-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feFlood flood-color="#e07a5f" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="sparkle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#e07a5f" stroke-width="1">
    <line x1="0" y1="200" x2="1024" y2="200"/>
    <line x1="0" y1="400" x2="1024" y2="400"/>
    <line x1="0" y1="600" x2="1024" y2="600"/>
    <line x1="0" y1="800" x2="1024" y2="800"/>
    <line x1="200" y1="0" x2="200" y2="1024"/>
    <line x1="400" y1="0" x2="400" y2="1024"/>
    <line x1="600" y1="0" x2="600" y2="1024"/>
    <line x1="800" y1="0" x2="800" y2="1024"/>
  </g>

  <!-- Ambient glow behind character -->
  <ellipse cx="512" cy="520" rx="280" ry="300" fill="#e07a5f" opacity="0.06"/>

  <!-- Claude's funky body/blob shape -->
  <g filter="url(#outer-glow)">
    <!-- Main blob body -->
    <path d="M512 220
      C620 220, 720 280, 740 380
      C760 470, 730 520, 750 580
      C770 640, 720 740, 640 770
      C580 800, 520 810, 460 800
      C380 780, 300 740, 280 660
      C260 580, 270 520, 280 440
      C290 320, 380 220, 512 220Z"
      fill="url(#glow)" />

    <!-- Highlight on body -->
    <path d="M512 240
      C600 240, 680 290, 710 370
      C730 430, 700 470, 690 420
      C670 340, 600 270, 512 260
      C430 260, 360 310, 330 390
      C320 430, 310 400, 310 380
      C330 290, 410 240, 512 240Z"
      fill="#f2cc8f" opacity="0.2" />
  </g>

  <!-- Funky sunglasses -->
  <g transform="translate(512, 440)">
    <!-- Glasses bridge -->
    <path d="M-30 -5 Q0 -15, 30 -5" stroke="#1a1a2e" stroke-width="12" fill="none" stroke-linecap="round"/>

    <!-- Left lens -->
    <ellipse cx="-90" cy="5" rx="75" ry="55" fill="#1a1a2e" stroke="#f2cc8f" stroke-width="5"/>
    <!-- Lens shine -->
    <ellipse cx="-110" cy="-10" rx="25" ry="15" fill="#ffffff" opacity="0.15" transform="rotate(-20, -110, -10)"/>
    <!-- Purple tint on lens -->
    <ellipse cx="-90" cy="5" rx="70" ry="50" fill="#7b2d8e" opacity="0.3"/>

    <!-- Right lens -->
    <ellipse cx="90" cy="5" rx="75" ry="55" fill="#1a1a2e" stroke="#f2cc8f" stroke-width="5"/>
    <!-- Lens shine -->
    <ellipse cx="70" cy="-10" rx="25" ry="15" fill="#ffffff" opacity="0.15" transform="rotate(-20, 70, -10)"/>
    <!-- Purple tint on lens -->
    <ellipse cx="90" cy="5" rx="70" ry="50" fill="#7b2d8e" opacity="0.3"/>

    <!-- Temple arms going to the side -->
    <line x1="-165" y1="0" x2="-200" y2="-20" stroke="#f2cc8f" stroke-width="8" stroke-linecap="round"/>
    <line x1="165" y1="0" x2="200" y2="-20" stroke="#f2cc8f" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- Smirk mouth -->
  <path d="M440 560 Q490 610, 580 580" stroke="#1a1a2e" stroke-width="10" fill="none" stroke-linecap="round"/>

  <!-- Claude's signature asterisk/sparkle on head - like a funky hat decoration -->
  <g transform="translate(600, 260) rotate(15)" filter="url(#neon)">
    <!-- Six-pointed sparkle -->
    <line x1="0" y1="-40" x2="0" y2="40" stroke="#f2cc8f" stroke-width="8" stroke-linecap="round"/>
    <line x1="-35" y1="-20" x2="35" y2="20" stroke="#f2cc8f" stroke-width="8" stroke-linecap="round"/>
    <line x1="-35" y1="20" x2="35" y2="-20" stroke="#f2cc8f" stroke-width="8" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="8" fill="#f2cc8f"/>
  </g>

  <!-- Small sparkles around -->
  <g opacity="0.7" filter="url(#neon)">
    <circle cx="300" cy="300" r="4" fill="#f2cc8f"/>
    <circle cx="750" cy="350" r="3" fill="#e07a5f"/>
    <circle cx="350" cy="700" r="3" fill="#f2cc8f"/>
    <circle cx="700" cy="680" r="4" fill="#e07a5f"/>
    <circle cx="250" cy="500" r="2.5" fill="#f2cc8f"/>
    <circle cx="780" cy="520" r="2.5" fill="#f2cc8f"/>
  </g>

  <!-- Chat bubble accent -->
  <g transform="translate(720, 300)" opacity="0.6">
    <path d="M0 0 Q-5 -30, 20 -35 Q45 -40, 50 -15 Q55 10, 30 15 Q20 18, 15 30 Q12 20, 5 15 Q-10 10, 0 0Z"
      fill="#f2cc8f" filter="url(#neon)"/>
    <!-- Dots in bubble -->
    <circle cx="18" cy="-10" r="4" fill="#1a1a2e"/>
    <circle cx="30" cy="-10" r="4" fill="#1a1a2e"/>
    <circle cx="42" cy="-10" r="4" fill="#1a1a2e"/>
  </g>

  <!-- Terminal cursor blinking accent bottom -->
  <g transform="translate(512, 880)" opacity="0.5">
    <rect x="-60" y="-8" width="15" height="16" rx="2" fill="#4ade80"/>
    <text x="-38" y="6" font-family="monospace" font-size="18" fill="#4ade80" font-weight="bold">claude</text>
    <rect x="52" y="-8" width="9" height="16" rx="1" fill="#4ade80" opacity="0.8"/>
  </g>
</svg>
